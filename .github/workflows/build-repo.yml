# Central F-Droid repository for all lorenzl5 Android apps.
#
# Collects the latest GitHub-Release APK of every repo listed in APPS,
# runs `fdroid update` over the full set and publishes to GitHub Pages.
# Phones subscribe ONCE to:
#   https://ilorenz00.github.io/fdroid-lorenzl5/repo
# — every new app added to APPS shows up automatically.
#
# Triggers: 30-min schedule, manual, or instant via repository_dispatch
# (type: app-updated) from an app repo that has a DISPATCH_TOKEN secret.
#
# Required secrets (same keystore as the app signing, used to sign the
# repo index): SIGNING_KEYSTORE_B64, SIGNING_STORE_PASSWORD,
# SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD
name: build-fdroid-repo

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [app-updated]

concurrency:
  group: build-fdroid-repo
  cancel-in-progress: false

permissions:
  contents: write   # gh-pages push

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # One "owner/repo" per line. New app => add a line, done.
      APPS: |
        ilorenz00/share-router-android
    steps:
      - uses: actions/checkout@v4

      - name: Download latest release APK of every app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p fdroid/repo
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "::group::$repo"
            gh release download --repo "$repo" --pattern '*.apk' --dir fdroid/repo --clobber \
              || echo "no release with APKs in $repo (yet) — skipping"
            echo "::endgroup::"
          done <<< "$APPS"
          count=$(ls fdroid/repo/*.apk 2>/dev/null | wc -l)
          echo "collected $count apk(s)"
          if [ "$count" -eq 0 ]; then
            echo "nothing to publish"; exit 1
          fi

      - name: Decode repo signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | tr -d '\r\n ' | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fdroidserver imagemagick

      - name: Build F-Droid index
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          mkdir -p fdroid/repo/icons
          convert -size 512x512 xc:'#1F6FEB' fdroid/icon.png
          cp fdroid/icon.png fdroid/repo/icons/icon.png

          cat > fdroid/config.yml <<EOF
          repo_url: https://ilorenz00.github.io/fdroid-lorenzl5/repo
          repo_name: lorenzl5 Apps
          repo_icon: icon.png
          repo_description: >-
            Personal F-Droid repo serving all lorenzl5 Android apps
            (Share Router, ...). Built from the latest GitHub release
            of each app repository.
          archive_older: 0
          keystore: $RUNNER_TEMP/release.jks
          repo_keyalias: $SIGNING_KEY_ALIAS
          keystorepass: $SIGNING_STORE_PASSWORD
          keypass: $SIGNING_KEY_PASSWORD
          keydname: CN=lorenzl5 F-Droid Repo
          EOF

          cd fdroid
          fdroid update --create-metadata --pretty

      - name: Publish to GitHub Pages
        # Only repo/ is published — fdroid/config.yml contains the signing
        # passwords and must never reach the public branch.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fdroid/repo
          destination_dir: repo
          publish_branch: gh-pages
          force_orphan: true
